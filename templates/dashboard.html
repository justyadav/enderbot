<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ender Bot Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #23272a; color: #fff; padding: 40px; }
        .card { background: #2c2f33; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        input[type="text"] { width: 80%; padding: 10px; margin-top: 10px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; background: #7289da; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #677bc4; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dashboard for {{ guild_name }}</h2>
    <p>Guild ID: {{ guild_id }}</p>
    <hr>
    <label for="prefix">Modify Server Prefix:</label><br>
    <input type="text" id="prefix" value="{{ prefix }}" maxlength="5">
    <button onclick="saveSettings()">Save Changes</button>
    <p id="status"></p>
</div>

<script>
async function saveSettings() {
    const prefixValue = document.getElementById('prefix').value;
    const statusText = document.getElementById('status');
    statusText.innerText = "Saving...";

    try {
        const response = await fetch('/api/settings/{{ guild_id }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prefix: prefixValue })
        });
        const result = await response.json();
        if (result.success) {
            statusText.innerText = "✅ Configuration updated and synchronized!";
            statusText.style.color = "#43b581";
        } else {
            statusText.innerText = "❌ Failed to update configuration.";
            statusText.style.color = "#f04747";
        }
    } catch (error) {
        statusText.innerText = "❌ Network connection error.";
    }
}
</script>
</body>
</html>
