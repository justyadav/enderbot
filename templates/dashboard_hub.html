<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ender Bot | Management Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #23272a; color: #fff; margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: auto; }
        h1 { border-bottom: 2px solid #2f3136; padding-bottom: 20px; }
        .server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 30px; }
        .server-card { background: #2f3136; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; border: 1px solid #4f545c; transition: 0.2s; }
        .server-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .server-icon { width: 70px; height: 70px; background: #5865F2; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .server-name { font-size: 18px; font-weight: bold; margin-bottom: 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
        .btn { padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 14px; width: 80%; display: inline-block; text-align: center; }
        .btn-manage { background: #43b581; color: white; }
        .btn-manage:hover { background: #3ca374; }
        .btn-invite { background: #4f545c; color: #dcddde; border: 1px solid #72767d; }
        .btn-invite:hover { background: #72767d; color: white; }
        .back-btn { display: inline-block; color: #b9bbbe; margin-bottom: 20px; text-decoration: none; }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-btn">← Back to Homepage</a>
    <h1>Select a Server to Manage</h1>
    <p>Only servers where you possess Administrative rights are rendered below.</p>

    <div class="server-grid">
        {% for server in servers %}
        <div class="server-card">
            <div class="server-icon">
                {{ server.name[0] }}
            </div>
            <div class="server-name">{{ server.name }}</div>
            
            {% if server.bot_in_guild %}
                <a href="/dashboard/{{ server.id }}" class="btn btn-manage">Configure Bot</a>
            {% else %}
                <a href="{{ invite_url }}&guild_id={{ server.id }}" target="_blank" class="btn btn-invite">Invite Ender</a>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
